name: benchmark

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_unit:
        description: Run unit benchmarks
        required: false
        default: true
        type: boolean
      run_integration_compare:
        description: Run integration benchmark comparison against main baseline
        required: false
        default: false
        type: boolean
      target_ref:
        description: Branch or commit SHA to benchmark
        required: false
        default: main
        type: string
      pr_number:
        description: PR number to comment on
        required: false
        default: ""
        type: string
      bench_count:
        description: Benchmark count
        required: false
        default: "1"
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read

env:
  UNIT_BENCHMARK_NAME: Ferret Go Benchmarks - Unit
  INTEGRATION_BENCHMARK_NAME: Ferret Go Benchmarks - Integration
  UNIT_BENCHMARK_OUTPUT: benchmark-unit-output.txt
  INTEGRATION_BENCHMARK_OUTPUT: benchmark-integration-output.txt

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref || inputs.target_ref }}
  cancel-in-progress: true

jobs:
  main-baseline-unit:
    name: Persist main unit benchmark baseline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit benchmarks
        run: |
          set -euo pipefail
          make bench-unit BENCH_COUNT=5 BENCH_TIMEOUT=15m | tee "${UNIT_BENCHMARK_OUTPUT}"

      - name: Upload raw unit benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-main-unit
          path: ${{ env.UNIT_BENCHMARK_OUTPUT }}
          if-no-files-found: warn

      - name: Store unit benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.UNIT_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.UNIT_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/unit
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: true
          summary-always: true

  main-baseline-integration:
    name: Persist main integration benchmark baseline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration benchmarks
        run: |
          set -euo pipefail
          make bench-integration BENCH_COUNT=5 BENCH_TIMEOUT=30m | tee "${INTEGRATION_BENCHMARK_OUTPUT}"

      - name: Upload raw integration benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-main-integration
          path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          if-no-files-found: warn

      - name: Store integration benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.INTEGRATION_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/integration
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: true
          summary-always: true

  pr-compare-unit:
    name: Compare PR unit benchmarks
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit benchmarks
        run: |
          set -euo pipefail
          make bench-unit BENCH_COUNT=1 BENCH_TIMEOUT=10m | tee "${UNIT_BENCHMARK_OUTPUT}"

      - name: Upload raw unit benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-pr-unit-${{ github.event.pull_request.number }}
          path: ${{ env.UNIT_BENCHMARK_OUTPUT }}
          if-no-files-found: warn

      - name: Compare unit benchmark result and comment
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.UNIT_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.UNIT_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/unit
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: false
          save-data-file: false
          comment-always: true
          summary-always: true
          fail-on-alert: true
          alert-threshold: '150%'

  manual-compare-integration:
    name: Manual integration benchmark comparison
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_compare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration benchmarks
        run: |
          set -euo pipefail
          make bench-integration BENCH_COUNT=${{ inputs.bench_count }} BENCH_TIMEOUT=30m | tee "${INTEGRATION_BENCHMARK_OUTPUT}"

      - name: Upload raw integration benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-manual-integration
          path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          if-no-files-found: warn

      - name: Compare integration benchmark result
        if: ${{ inputs.pr_number == '' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.INTEGRATION_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/integration
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: false
          save-data-file: false
          summary-always: true
          fail-on-alert: false
          alert-threshold: '150%'

      - name: Compare integration benchmark result and comment on PR
        if: ${{ inputs.pr_number != '' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.INTEGRATION_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/integration
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: false
          save-data-file: false
          comment-on-alert: true
          comment-always: true
          summary-always: true
          fail-on-alert: false
          alert-threshold: '150%'
          pull-request: ${{ inputs.pr_number }}

  comment-compare-integration:
    name: Comment-triggered integration benchmark comparison
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/bench-integration')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Reject untrusted trigger
        id: authz
        run: |
          set -euo pipefail
          assoc="${{ github.event.comment.author_association }}"
          case "$assoc" in
            OWNER|MEMBER|COLLABORATOR)
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Add denial comment
        if: steps.authz.outputs.allowed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Integration benchmarks can only be triggered by a repository owner, member, or collaborator."
            })

      - name: Get PR metadata
        if: steps.authz.outputs.allowed == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Reject fork PRs
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo != github.repository
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Comment-triggered integration benchmarks are only enabled for same-repository PRs. Use the manual workflow for fork PRs."
            })

      - uses: actions/checkout@v4
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - uses: actions/setup-go@v5
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        with:
          go-version-file: go.mod
          cache: true

      - name: Acknowledge command
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Running integration benchmarks for `" + "${{ steps.pr.outputs.head_sha }}".slice(0,7) + "` against the main baseline."
            })

      - name: Run integration benchmarks
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        run: |
          set -euo pipefail
          make bench-integration BENCH_COUNT=1 BENCH_TIMEOUT=30m | tee "${INTEGRATION_BENCHMARK_OUTPUT}"

      - name: Upload raw integration benchmark output
        if: always() && steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-comment-integration-pr-${{ github.event.issue.number }}
          path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          if-no-files-found: warn

      - name: Compare integration benchmark result and comment
        if: steps.authz.outputs.allowed == 'true' && steps.pr.outputs.head_repo == github.repository
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ env.INTEGRATION_BENCHMARK_NAME }}
          tool: go
          output-file-path: ${{ env.INTEGRATION_BENCHMARK_OUTPUT }}
          benchmark-data-dir-path: dev/bench/integration
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/heads/main
          auto-push: false
          save-data-file: false
          comment-always: true
          summary-always: true
          fail-on-alert: false
          alert-threshold: '150%'